<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 52 - Igor Gorzoch</title>
</head>
<body>

<script>
    let a_gor = (7 % 4) + 5;
    let b_gor = (7 % 6) + 20;

    for (let i_gor = 1; i_gor <= a_gor; i_gor++) {
        for (let j_gor = 1; j_gor <= b_gor; j_gor++) {
            if (i_gor == 1 || i_gor == a_gor || j_gor == 1 || j_gor == b_gor) {
                document.write("*");
            } else {
                document.write("&nbsp;&nbsp;");
            }
        }
        document.write("<br>");
    }
</script>

</body>
</html>
