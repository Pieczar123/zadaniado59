<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 58 - Igor Gorzoch</title>
</head>
<body>

<script>
    let liczba1_gor = prompt("Podaj pierwszą liczbę:");
    let liczba2_gor = prompt("Podaj drugą liczbę:");

    liczba1_gor = parseInt(liczba1_gor);
    liczba2_gor = parseInt(liczba2_gor);

    if (liczba1_gor == liczba2_gor) {
        confirm("Liczby są równe");
    } else if (liczba1_gor < liczba2_gor) {
        for (let i_gor = liczba1_gor; i_gor <= liczba2_gor; i_gor++) {
            if (i_gor % 2 == 0) {
                document.write("<span style='color:green; font-size:30px;'>" + i_gor + "</span><br>");
            }
        }
    } else {
        for (let i_gor = liczba1_gor; i_gor >= liczba2_gor; i_gor--) {
            if (i_gor % 2 != 0) {
                document.write("<span style='color:blue; font-size:10px;'>" + i_gor + "</span><br>");
            }
        }
    }
</script>

</body>
</html>
