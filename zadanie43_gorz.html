<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 43</title>
</head>
<body>

<div> style="color:red; font-size:40px;">
<script>
    let koniec_petli_gor = prompt("Podaj liczbę końcową:");
    koniec_petli_gor = parseInt(koniec_petli_gor);

    for (let i_g = 2; i_g <= koniec_petli_gor; i_g++) {
        if (i_g % 2 == 0) {
            document.write(i_g + "<br>");
        }
    }
</script>
</div>

</body>
</html>
