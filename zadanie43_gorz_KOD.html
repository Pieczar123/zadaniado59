<script>
    let koniec_petli_gor = prompt("Podaj liczbę końcową:");
    koniec_petli_gor = parseInt(koniec_petli_gor);

    for (let i_gor = 2; i_gor <= koniec_petli_gor; i_gor++) {
        if (i_gor % 2 == 0) {
            document.write(i_gor + "<br>");
        }
    }
</script>
