<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 51 - Igor Gorzoch</title>
</head>
<body>

<div style="color:blue; font-size:5mm;">
<script>
    let ile_gor = prompt("Ile razy powtórzyć?");
    ile_gor = parseInt(ile_gor);

    let tekst_gor = prompt("Podaj tekst, np. swoje inicjały:");

    for (let i_gor = 1; i_gor <= ile_gor; i_gor++) {
        for (let j_gor = 1; j_gor <= i_gor; j_gor++) {
            document.write("&nbsp;");
        }

        document.write(i_gor + "_" + tekst_gor + "_" + i_gor + "<br>");
    }
</script>
</div>

</body>
</html>
