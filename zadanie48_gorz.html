<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 48 - Igor Gorzoch</title>
</head>
<body>

<div style="color:red; font-size:30px;">
<script>
    let suma_gor = 0;

    for (let i_gor = 1; i_gor <= 1000000; i_gor++) {
        suma_gor = suma_gor + 1 / i_gor;
    }

    document.write("Suma szeregu harmonicznego od 1 do 1000000 wynosi: " + suma_gor);
</script>
</div>

</body>
</html>
