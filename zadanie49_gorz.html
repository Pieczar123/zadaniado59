<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 49 - Igor Gorzoch</title>
</head>
<body>

<div style="color:red; font-size:30px;">
<script>
    let n_gor = prompt("Podaj liczbę n:");
    n_gor = parseInt(n_gor);

    let silnia_gor = 1;

    for (let i_gor = 1; i_gor <= n_gor; i_gor++) {
        silnia_gor = silnia_gor * i_gor;
    }

    document.write("n = " + n_gor + "<br>");
    document.write(n_gor + "! = " + silnia_gor);
</script>
</div>

</body>
</html>
