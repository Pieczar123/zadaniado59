<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 57 - Igor Gorzoch</title>
</head>
<body>

<script>
    for (let i_gor = 15; i_gor <= 25; i_gor++) {
        let pierw2_gor = Math.sqrt(i_gor);
        let pierw4_gor = Math.sqrt(pierw2_gor);

        document.write(
            "i = " + i_gor +
            "&nbsp;&nbsp;&nbsp; pierw_2(" + i_gor + ") = " + pierw2_gor.toFixed(2) +
            "&nbsp;&nbsp;&nbsp; pierw_4(" + i_gor + ") = " + pierw4_gor.toFixed(2) +
            "<br>"
        );
    }
</script>

</body>
</html>
