<html>
<body>
<p style="color:green;"> MENU </p>
<p style="color:red;"> kolor czerwony </p>
<p style="color:blue;"> kolor niebieski </p>

<input type="button" name="gorzoch" value="Oblicz" onclick="fun_gorz()" />

<script>
function fun_gorz() {
 var x_gorz = prompt("Podaj kolor", "");
 if(x_gorz == 1 || x_gorz.toLowerCase() == "czerwony") {
  document.write('<h1 style="color:red;">wczytałeś kolor czerwony</h1><br />');
 }
 else if(x_gorz == 2 || x_gorz.toLowerCase() == "niebieski") {
  document.write('<h2 style="color:blue;"> wczytałeś kolor niebieski</h2><br />');
 }
}
</script>

</body>
</html>
