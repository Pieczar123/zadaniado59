<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 56 - Igor Gorzoch</title>
</head>
<body>

<script>
    for (let i_gor = 0; i_gor <= 39; i_gor++) {
        let w_gor = i_gor * i_gor + i_gor + 41;

        document.write("i = " + i_gor + "&nbsp;&nbsp;&nbsp; w(" + i_gor + ") = " + w_gor + "<br>");

        if ((i_gor + 1) % 5 == 0) {
            document.write("<br>");
        }
    }
</script>

</body>
</html>
